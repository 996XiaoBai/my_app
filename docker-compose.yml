version: '3.8'

services:
  app:
    build: ./test_platform
    container_name: interest-island-review-agent
    ports:
      - "8501:8501"
    volumes:
      - ./history:/app/history # 持久化历史记录
      - ./.env:/app/.env # 挂载环境变量
      - ./logs:/app/logs # 挂载日志
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
