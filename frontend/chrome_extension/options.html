<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>智能缺陷报告 - 设置</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="options-container">
        <header>
            <h1>🐞 智能缺陷报告 - 设置</h1>
            <p class="subtitle">配置 API 连接信息</p>
        </header>

        <div id="status-message" class="status hidden"></div>

        <!-- Dify 配置 -->
        <section class="config-section">
            <h2>🤖 Dify AI 配置</h2>
            <div class="form-group">
                <label for="dify-base">API Base URL</label>
                <input type="text" id="dify-base" placeholder="https://dify.cvte.com/v1">
                <span class="hint">Dify 服务的 API 地址</span>
            </div>
            <div class="form-group">
                <label for="dify-key">API Key</label>
                <input type="password" id="dify-key" placeholder="app-xxxxxxx">
                <span class="hint">Dify 应用的 API 密钥</span>
            </div>
            <div class="form-group">
                <label for="dify-user">User ID</label>
                <input type="text" id="dify-user" placeholder="bug_reporter">
                <span class="hint">Dify 要求的用户标识（可选，不填则使用默认值）</span>
            </div>
        </section>

        <!-- TAPD 配置 -->
        <section class="config-section">
            <h2>📋 TAPD 配置</h2>
            <div class="form-group">
                <label for="tapd-workspace">Workspace ID</label>
                <input type="text" id="tapd-workspace" placeholder="输入 TAPD 项目 ID">
            </div>
            <div class="form-group">
                <label for="tapd-user">API User</label>
                <input type="text" id="tapd-user" placeholder="TAPD API 账号">
            </div>
            <div class="form-group">
                <label for="tapd-password">API Password</label>
                <input type="password" id="tapd-password" placeholder="TAPD API 密码">
            </div>
        </section>

        <!-- 默认值 -->
        <section class="config-section">
            <h2>👤 默认值</h2>
            <div class="form-row">
                <div class="form-group half">
                    <label for="default-submitter">默认提交人</label>
                    <input type="text" id="default-submitter" placeholder="你的名字">
                </div>
                <div class="form-group half">
                    <label for="default-version">默认版本号</label>
                    <input type="text" id="default-version" placeholder="V1.0.0">
                </div>
            </div>
        </section>

        <div class="actions">
            <button id="btn-save" class="btn-primary">💾 保存设置</button>
            <button id="btn-test" class="btn-secondary">🔗 测试连接</button>
        </div>
    </div>

    <script src="options.js"></script>
</body>

</html>
