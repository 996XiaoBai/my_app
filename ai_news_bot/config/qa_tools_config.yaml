  # 全局每天最多推 10 篇精选
  max_count: 10

  # QA 线扩充信源后保留更大的候选池，最终再做质量排序
  candidate_pool_multiplier: 5

  # 候选阶段不限制单一信源条数，优先让高质量内容先进入后续排序
  max_per_source: 0

  # 正文补抓配置，用于提升测试相关性判断准确性
  content_fetch_limit: 14
  content_fetch_concurrency: 4
  full_content_max_chars: 3500

  # 最终入选阶段不限制同一信源条数，但仍限制单一类别占比
  max_per_source_final: 0
  max_per_category_final: 2

  # QA 资讯保持质量门槛，但适度放宽以提升高相关边缘内容的入选率
  min_quality_score: 5

  # 允许预发布版本标题进入候选，交由质量评分和最终排序决定去留
  allow_prerelease_titles: true

  # 进入 Dify 前只保留前 7 条高优先级候选，减少限流并避免弱内容耗掉摘要配额
  dify_candidate_limit: 7

  # Dify 预选阶段不限制同一信源条数，优先让高质量内容拿到摘要机会
  dify_candidate_max_per_source: 0

  # 激进模式：优先给新增接入信源预留 4 个摘要名额，提升其进入最终日报的概率
  dify_exploration_slots: 4

  # 若连续 2 条候选都命中 Dify 吞吐限流，则提前结束本轮摘要，避免整批候选都撞在限流窗口上
  dify_rate_limit_abort_threshold: 2

  # Dify 遇到吞吐限流时，处理下一条内容前额外等待秒数
  dify_throttle_backoff_seconds: 6

  # Dify 命中吞吐限流后，进入下一轮冷却重试前的等待时间
  dify_rate_limit_cooldown_seconds: 18

  # Dify 命中吞吐限流后，额外执行的冷却重试轮次
  dify_rate_limit_retry_rounds: 1

scheduler:
  enabled: true
  schedules:
